<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PL Team of the Week – Matchweek {{ matchweek }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 900px;
      height: 1330px;
      overflow: hidden;
      background: #0e1a12;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    .header {
      position: relative;
      width: 900px;
      height: 70px;
      background: linear-gradient(135deg, #37003c 0%, #1e0026 50%, #100016 100%);
      display: flex;
      align-items: center;
      overflow: hidden;
      z-index: 20;
      flex-shrink: 0;
    }

    /* Decorative diagonal accent */
    .header::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 0; bottom: 0;
      width: 340px;
      background: rgba(0,255,135,0.07);
      transform: skewX(-15deg);
      transform-origin: top left;
    }

    /* Bottom accent line */
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #e90052, #00ff87 40%, transparent 80%);
    }

    .header-pl-logo {
      position: relative;
      margin-left: 20px;
      margin-right: 20px;
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .header-pl-logo img {
      height: 44px;
      width: auto;
      display: block;
      filter: brightness(0) invert(1);
    }

    .header-divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      margin: 0 18px;
      flex-shrink: 0;
    }

    .header-text-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .header-league {
      font-family: 'Oswald', Impact, sans-serif;
      font-weight: 500;
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1;
    }

    .header-title {
      font-family: 'Oswald', Impact, sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #ffffff;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1;
    }

    .header-spacer { flex: 1; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 24px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 12px;
      border-radius: 4px;
      font-family: 'Oswald', Impact, sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge-gw {
      background: rgba(0,255,135,0.15);
      color: #00ff87;
      border: 1px solid rgba(0,255,135,0.4);
    }

    .badge-formation {
      background: #e90052;
      color: #fff;
    }

    /* ── PITCH ─────────────────────────────────────────── */
    .pitch-wrap {
      position: relative;
      width: 900px;
      height: 1260px;
      /* Lawn stripes — horizontal bands, each ~90px */
      background:
        repeating-linear-gradient(
          180deg,
          #196c2d 0px,
          #196c2d 90px,
          #1e8035 90px,
          #1e8035 180px
        );
      overflow: hidden;
    }

    /* Dark vignette edges for depth */
    .pitch-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 105% 90% at 50% 50%,
        transparent 55%,
        rgba(0,0,0,0.35) 100%
      );
      pointer-events: none;
      z-index: 3;
    }

    /* Top goal-mouth shadow */
    .pitch-wrap::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, transparent 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* ── PITCH SVG (markings) ───────────────────────────── */
    .pitch-svg {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── PLAYER CARDS ───────────────────────────────────── */
    .player {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 10;
    }

    .player-photo-ring {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0.35));
      box-shadow:
        0 5px 20px rgba(0,0,0,0.65),
        0 0 0 2px rgba(255,255,255,0.2);
    }

    .player-photo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      background: #37003c;
      display: block;
    }

    /* Team badge — bottom left */
    .team-badge {
      position: absolute;
      bottom: -3px;
      left: -3px;
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.95);
      padding: 2px;
      object-fit: contain;
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    /* Nationality flag — bottom right (circle crop) */
    .player-flag-badge {
      position: absolute;
      bottom: -3px;
      right: -3px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.95);
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
      background: #1a1a2e;
      overflow: hidden;
    }

    .player-nameplate {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(4, 1, 18, 0.88);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      padding: 5px 12px;
      border-radius: 26px;
      max-width: 160px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.55);
    }

    .player-name {
      font-family: 'Barlow Condensed', 'Oswald', Arial, sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 118px;
      letter-spacing: 0.3px;
      line-height: 1;
    }

    .player-rating {
      font-family: 'Oswald', Arial, sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #37003c;
      background: #00ff87;
      padding: 2px 6px;
      border-radius: 10px;
      line-height: 1.4;
      flex-shrink: 0;
      letter-spacing: 0.2px;
    }

    .player-pos {
      font-family: 'Oswald', Arial, sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <!-- ── HEADER ─── -->
  <div class="header">
    <div class="header-pl-logo">
      <img src="https://www.premierleague.com/resources/v1.41.18/i/svg-files/elements/pl-logo-dark.svg" alt="Premier League">
    </div>
    <div class="header-text-group">
      <span class="header-league">Premier League</span>
      <span class="header-title">Team of the Week</span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-right">
      <span class="header-badge badge-gw">Matchweek {{ matchweek }}</span>
      <span class="header-badge badge-formation">{{ formation }}</span>
    </div>
  </div>

  <!-- ── PITCH ─── -->
  <div class="pitch-wrap">

    <!--
      SVG pitch markings derived from the Football_field.svg reference.
      Field: x=22, y=10, width=856, height=1214 (within 900×1260 pitch-wrap)
      Scale X=856/68=12.588  Scale Y=1214/105=11.562
      Centre: (450, 617)
    -->
    <svg class="pitch-svg" viewBox="0 0 900 1260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="net-top" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
          <path d="M 0 0 L 8 8 M 8 0 L 0 8" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" fill="none"/>
        </pattern>
        <pattern id="net-bot" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
          <path d="M 0 0 L 8 8 M 8 0 L 0 8" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" fill="none"/>
        </pattern>
      </defs>

      <!-- ─ PITCH MARKINGS ─ stroke only, no fill ─ -->
      <g fill="none" stroke="rgba(255,255,255,0.82)" stroke-width="1.8" stroke-linecap="round">

        <!-- Border -->
        <rect x="22" y="10" width="856" height="1214"/>

        <!-- Centre line -->
        <line x1="22" y1="617" x2="878" y2="617"/>

        <!-- Centre circle (circle — field is now portrait/natural proportions) -->
        <ellipse cx="450" cy="617" rx="115" ry="106"/>
        <!-- Centre spot -->
        <circle cx="450" cy="617" r="4" fill="rgba(255,255,255,0.82)" stroke="none"/>

        <!-- ─ TOP HALF ─ -->

        <!-- Top penalty area -->
        <path d="M 196,10 V 201 H 704 V 10"/>

        <!-- Top goal area -->
        <path d="M 335,10 V 74 H 565 V 10"/>

        <!-- Top penalty spot -->
        <circle cx="450" cy="136" r="4" fill="rgba(255,255,255,0.82)" stroke="none"/>

        <!-- Top penalty arc -->
        <path d="M 359,201 a 115,106 0 0 0 183,0"/>

        <!-- ─ BOTTOM HALF ─ -->

        <!-- Bottom penalty area -->
        <path d="M 196,1224 V 1033 H 704 V 1224"/>

        <!-- Bottom goal area -->
        <path d="M 335,1224 V 1160 H 565 V 1224"/>

        <!-- Bottom penalty spot -->
        <circle cx="450" cy="1098" r="4" fill="rgba(255,255,255,0.82)" stroke="none"/>

        <!-- Bottom penalty arc -->
        <path d="M 359,1033 a 115,106 0 0 1 183,0"/>

        <!-- ─ CORNER ARCS ─ rx=25, ry=23 -->
        <!-- TL --> <path d="M 22,33 a 25,23 0 0 0 25,-23"/>
        <!-- TR --> <path d="M 853,10 a 25,23 0 0 0 25,23"/>
        <!-- BR --> <path d="M 878,1201 a 25,23 0 0 0 -25,23"/>
        <!-- BL --> <path d="M 47,1224 a 25,23 0 0 0 -25,-23"/>

      </g>

      <!-- ─ GOAL NETS ─ -->
      <rect x="335" y="10" width="230" height="64" fill="url(#net-top)" opacity="0.5"/>
      <rect x="335" y="1160" width="230" height="64" fill="url(#net-bot)" opacity="0.5"/>

      <!-- ─ CONNECTOR LINES between players in same line ─ -->
      <g stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-dasharray="6,5" fill="none">
        {% for line in connector_lines %}
        <line x1="{{ line.x1 }}" y1="{{ line.y1 }}" x2="{{ line.x2 }}" y2="{{ line.y2 }}"/>
        {% endfor %}
      </g>

    </svg><!-- /pitch-svg -->

    <!-- ── PLAYER CARDS ─── -->
    {% for player in players %}
    <div class="player" style="left:{{ player.x }}%; top:{{ player.y }}%;">
      <div class="player-photo-ring">
        <img class="player-photo"
          src="{{ player.photo_url }}"
          alt="{{ player.name }}"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 70 70%22><circle cx=%2235%22 cy=%2235%22 r=%2235%22 fill=%22%2337003c%22/><text x=%2235%22 y=%2242%22 font-family=%22Arial%22 font-weight=%22bold%22 font-size=%2218%22 fill=%22%2300ff87%22 text-anchor=%22middle%22>{{ player.initials }}</text></svg>'">
        <img class="team-badge"
          src="{{ player.team_badge_url }}"
          alt="{{ player.team_name }}"
          onerror="this.style.display='none'">
        {% if player.flag_url %}
        <img class="player-flag-badge"
          src="{{ player.flag_url }}"
          alt=""
          onerror="this.style.display='none'">
        {% endif %}
      </div>
      <div class="player-nameplate">
        <span class="player-name">{{ player.display_name }}</span>
        {% if player.rating %}<span class="player-rating">{{ player.rating }}</span>{% endif %}
      </div>
      <span class="player-pos">{{ player.position_slot }}</span>
    </div>
    {% endfor %}

  </div><!-- /pitch-wrap -->

</body>
</html>
